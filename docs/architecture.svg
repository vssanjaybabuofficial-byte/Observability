<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 980" width="100%" font-family="Helvetica, Arial, sans-serif">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#555"/>
  </marker>
</defs>
<rect x="0" y="0" width="1100" height="980" fill="white"/>
<text x="550.0" y="48" font-size="22" font-weight="700" text-anchor="middle" fill="#222">Chronicle - Solution Flow Architecture</text>
<rect x="40" y="110" width="210" height="60" rx="6" ry="6" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
<text x="145.0" y="128" font-size="13" font-weight="700" text-anchor="middle" fill="#222">Anthropic SDK</text>
<text x="145.0" y="144" font-size="11" text-anchor="middle" fill="#333">messages.create(...)</text>
<text x="145.0" y="158" font-size="11" text-anchor="middle" fill="#333">usage.input_tokens</text>
<rect x="40" y="190" width="210" height="60" rx="6" ry="6" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
<text x="145.0" y="208" font-size="13" font-weight="700" text-anchor="middle" fill="#222">OpenAI SDK</text>
<text x="145.0" y="224" font-size="11" text-anchor="middle" fill="#333">chat.completions.create(...)</text>
<text x="145.0" y="238" font-size="11" text-anchor="middle" fill="#333">usage.prompt_tokens</text>
<rect x="40" y="270" width="210" height="60" rx="6" ry="6" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
<text x="145.0" y="288" font-size="13" font-weight="700" text-anchor="middle" fill="#222">Custom Tools</text>
<text x="145.0" y="304" font-size="11" text-anchor="middle" fill="#333">any Python callable</text>
<text x="145.0" y="318" font-size="11" text-anchor="middle" fill="#333">wrapped with @tool</text>
<rect x="380" y="110" width="360" height="80" rx="6" ry="6" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
<text x="560.0" y="128" font-size="13" font-weight="700" text-anchor="middle" fill="#222">User Agent Code</text>
<text x="560.0" y="144" font-size="11" text-anchor="middle" fill="#333">your application logic</text>
<text x="560.0" y="158" font-size="11" text-anchor="middle" fill="#333">calls LLM SDKs and tools</text>
<rect x="380" y="250" width="360" height="80" rx="6" ry="6" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
<text x="560.0" y="268" font-size="13" font-weight="700" text-anchor="middle" fill="#222">Ergonomics Layer</text>
<text x="560.0" y="284" font-size="11" text-anchor="middle" fill="#333">@llm   @tool   span()   record()</text>
<text x="560.0" y="298" font-size="11" text-anchor="middle" fill="#333">contextvars-based parent threading</text>
<rect x="380" y="360" width="360" height="50" rx="6" ry="6" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
<text x="560.0" y="378" font-size="13" font-weight="700" text-anchor="middle" fill="#222">Chronicle.record(...)</text>
<text x="560.0" y="394" font-size="11" text-anchor="middle" fill="#333">builds Event, links parents, indexes</text>
<rect x="380" y="440" width="360" height="80" rx="6" ry="6" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.5"/>
<text x="560.0" y="458" font-size="13" font-weight="700" text-anchor="middle" fill="#222">Event (frozen, content-addressed)</text>
<text x="560.0" y="474" font-size="11" text-anchor="middle" fill="#333">id = blake2b(canonical_json(kind, actor,</text>
<text x="560.0" y="488" font-size="11" text-anchor="middle" fill="#333">payload, parents, meta))   //   telemetry NOT hashed</text>
<rect x="380" y="560" width="360" height="80" rx="6" ry="6" fill="#f8cecc" stroke="#b85450" stroke-width="1.5"/>
<text x="560.0" y="578" font-size="13" font-weight="700" text-anchor="middle" fill="#222">Chronicle DAG (in-memory)</text>
<text x="560.0" y="594" font-size="11" text-anchor="middle" fill="#333">_events: id -&gt; Event   _children: id -&gt; {ids}</text>
<text x="560.0" y="608" font-size="11" text-anchor="middle" fill="#333">_order: insertion order list</text>
<rect x="380" y="680" width="360" height="70" rx="6" ry="6" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
<text x="560.0" y="698" font-size="13" font-weight="700" text-anchor="middle" fill="#222">Persistence</text>
<text x="560.0" y="714" font-size="11" text-anchor="middle" fill="#333">Chronicle.dump(path)   Chronicle.load(path)</text>
<text x="560.0" y="728" font-size="11" text-anchor="middle" fill="#333">JSONL  -  re-verifies integrity on load</text>
<rect x="380" y="780" width="360" height="80" rx="6" ry="6" fill="#f5f5f5" stroke="#666666" stroke-width="1.5"/>
<text x="560.0" y="798" font-size="13" font-weight="700" text-anchor="middle" fill="#222">Streamlit Dashboard</text>
<text x="560.0" y="814" font-size="11" text-anchor="middle" fill="#333">chronicle-dashboard &lt;trace.jsonl&gt;</text>
<text x="560.0" y="828" font-size="11" text-anchor="middle" fill="#333">Overview . LLM . Tool . DAG . Search . Raw</text>
<rect x="380" y="890" width="360" height="40" rx="6" ry="6" fill="#f8cecc" stroke="#b85450" stroke-width="1.5"/>
<text x="560.0" y="908" font-size="13" font-weight="700" text-anchor="middle" fill="#222">Browser @ http://localhost:8501</text>
<rect x="830" y="370" width="240" height="60" rx="6" ry="6" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
<text x="950.0" y="388" font-size="13" font-weight="700" text-anchor="middle" fill="#222">Causal Queries</text>
<text x="950.0" y="404" font-size="11" text-anchor="middle" fill="#333">ancestors / descendants / why(eid)</text>
<rect x="830" y="445" width="240" height="60" rx="6" ry="6" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
<text x="950.0" y="463" font-size="13" font-weight="700" text-anchor="middle" fill="#222">Integrity</text>
<text x="950.0" y="479" font-size="11" text-anchor="middle" fill="#333">verify() / root()   Merkle over ids</text>
<rect x="830" y="520" width="240" height="60" rx="6" ry="6" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
<text x="950.0" y="538" font-size="13" font-weight="700" text-anchor="middle" fill="#222">Semantic Index</text>
<text x="950.0" y="554" font-size="11" text-anchor="middle" fill="#333">HashingEmbedder   cosine top-k</text>
<rect x="830" y="595" width="240" height="60" rx="6" ry="6" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
<text x="950.0" y="613" font-size="13" font-weight="700" text-anchor="middle" fill="#222">Telemetry Rollup</text>
<text x="950.0" y="629" font-size="11" text-anchor="middle" fill="#333">stats(): tokens, latency, cost</text>
<rect x="830" y="670" width="240" height="60" rx="6" ry="6" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
<text x="950.0" y="688" font-size="13" font-weight="700" text-anchor="middle" fill="#222">Counterfactual Branch</text>
<text x="950.0" y="704" font-size="11" text-anchor="middle" fill="#333">branch_at(eid) / diff()   exact set algebra</text>
<text x="560.0" y="221" font-size="11" font-style="italic" text-anchor="middle" fill="#555">@llm   @tool   span()   record()</text>
